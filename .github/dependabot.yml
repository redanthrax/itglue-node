version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns:
          - '*'
        dependency-type: development
    commit-message:
      prefix: chore
      include: scope
    # typescript-eslint does not support TypeScript 7.0 yet (needs 7.1 programmatic API).
    # See https://github.com/typescript-eslint/typescript-eslint/issues/12518
    ignore:
      - dependency-name: typescript
        update-types: ['version-update:semver-major']
    # All Dependabot PRs must pass the "Supply chain security" workflow before merge
    # (enable required status checks on master in GitHub branch protection).
